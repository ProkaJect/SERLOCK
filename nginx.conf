location / {
  root /app/public;
  index index.html;
  try_files $uri $uri/ =404;

  server_tokens off;

  add_header X-Content-Type-Options    "nosniff" always;
  add_header X-Frame-Options           "DENY" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy    "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https://tile.openstreetmap.org; connect-src https://api.web3forms.com; form-action https://api.web3forms.com 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
}
